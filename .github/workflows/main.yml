name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/docker-build.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}
      run_pre_build: true
      docker_targets: "bess pfcp"

  build-ptf:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/docker-build.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}
      build_directory: "./ptf"
      build_command: "make build"

  static-analysis:
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/static-analysis.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}

  lint:
    permissions:
      contents: read
      checks: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/lint.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      golangci_lint_version: 'v2.11.3'
      branch_name: ${{ github.ref }}

  hadolint:
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/hadolint.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}

  check-spelling:
    permissions:
      contents: read
      checks: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/check-spelling.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}

  route-control-tests:
    permissions:
      contents: read
      checks: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/upf-route-control-tests.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}

  unit-tests-pfcp:
    permissions:
      contents: read
      checks: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/unit-test.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}
      test_flags: "-race -failfast -v"
      test_directory: "./pfcpiface ./cmd/..."

  integration-tests-bess:
    permissions:
      contents: read
      checks: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/unit-test.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}
      test_flags: "-race -failfast -v -count=1"
      test_directory: "./test/integration/..."
      env_vars: "MODE=native DATAPATH=bess"

  license-check:
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/license-check.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}

  fossa-scan:
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
    uses: omec-project/.github/.github/workflows/fossa-scan.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}

  analysis:
    if: github.repository_owner == 'omec-project'
    permissions:
      actions: read
      artifact-metadata: read
      attestations: read
      checks: read
      code-quality: read
      contents: read
      deployments: read
      discussions: read
      drives: read
      id-token: write
      issues: read
      models: read
      packages: read
      pages: read
      pull-requests: read
      repository-projects: read
      security-events: write
      statuses: read
      vulnerability-alerts: read
    uses: omec-project/.github/.github/workflows/scorecard-analysis.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      branch_name: ${{ github.ref }}
