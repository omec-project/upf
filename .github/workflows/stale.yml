on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
      contents: read
      actions: read
    uses: omec-project/.github/.github/workflows/stale-issue.yml@b5505f9f8923c31b4395b3268d28df9382389c21 # v0.0.18
    with:
      days_before_stale: 120
      days_before_close: 15
    secrets: inherit
