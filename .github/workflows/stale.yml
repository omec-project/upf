on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
      contents: read
      actions: read
    uses: omec-project/.github/.github/workflows/stale-issue.yml@7d95c1966f0335e8135b833e5a33f1bec71c17c7 # v0.0.29
    with:
      days_before_stale: 120
      days_before_close: 15
    secrets: inherit
